---
- name: Mirror container images
  hosts: all

  vars:
    docker_registry: registry.osism.tech

    _publish: "{{ publish | default(False) }}"
    _full: "{{ full | default(False) }}"
    _openstack_version: "{{ openstack_version | default('') }}"
    _tarball_name: "{{ 'registry-' ~ _openstack_version ~ '-full.tar.bz2' if _full | bool else 'registry.tar.bz2' }}"

  tasks:
    - name: Load metalbox image list
      ansible.builtin.include_vars: vars/container-images-metalbox.yml

    - name: Load openstack image list
      ansible.builtin.include_vars: "vars/container-images-openstack-{{ _openstack_version }}.yml"
      when: _full | bool

    - name: Load manager-stable image list
      ansible.builtin.include_vars: vars/container-images-manager-stable.yml
      when:
        - _full | bool
        - _openstack_version == "stable"

    - name: Create registry volume
      community.docker.docker_volume:
        name: registry

    - name: Run local container registry
      community.docker.docker_container:
        name: registry
        image: registry:3
        state: started
        ports:
          - "5000:5000"
        volumes:
          - registry:/var/lib/registry

    - name: Copy manager external images
      ansible.builtin.command:
        cmd: "skopeo copy --retry-times 2 --dest-tls-verify=false docker://{{ docker_registry }}/dockerhub/{{ item }} docker://localhost:5000/{{ item }}"
      loop: "{{ images_manager_external }}"
      changed_when: false

    - name: Copy manager images
      ansible.builtin.command:
        cmd: "skopeo copy --retry-times 2 --dest-tls-verify=false docker://{{ docker_registry }}/osism/{{ item }} docker://localhost:5000/osism/{{ item }}"
      loop: "{{ images_manager }}"
      changed_when: false

    - name: Copy osism images
      ansible.builtin.command:
        cmd: "skopeo copy --retry-times 2 --dest-tls-verify=false docker://{{ docker_registry }}/osism/{{ item }} docker://localhost:5000/osism/{{ item }}"
      loop: "{{ images_osism | default([]) }}"
      changed_when: false
      when: _full | bool

    - name: Copy kolla images
      ansible.builtin.command:
        cmd: "skopeo copy --retry-times 2 --dest-tls-verify=false docker://{{ docker_registry }}/kolla/{{ item }} docker://localhost:5000/kolla/{{ item }}"
      loop: "{{ images_kolla_metalbox }}"
      changed_when: false

    - name: Copy remaining kolla images
      ansible.builtin.command:
        cmd: "skopeo copy --retry-times 2 --dest-tls-verify=false docker://{{ docker_registry }}/kolla/{{ item }} docker://localhost:5000/kolla/{{ item }}"
      loop: "{{ images_kolla }}"
      changed_when: false
      when: _full | bool

    - name: Copy manager-stable external images
      ansible.builtin.command:
        cmd: "skopeo copy --retry-times 2 --dest-tls-verify=false docker://{{ docker_registry }}/dockerhub/{{ item }} docker://localhost:5000/{{ item }}"
      loop: "{{ images_manager_stable_external }}"
      changed_when: false
      when:
        - _full | bool
        - _openstack_version == "stable"

    - name: Copy manager-stable images
      ansible.builtin.command:
        cmd: "skopeo copy --retry-times 2 --dest-tls-verify=false docker://{{ docker_registry }}/osism/{{ item }} docker://localhost:5000/osism/{{ item }}"
      loop: "{{ images_manager_stable }}"
      changed_when: false
      when:
        - _full | bool
        - _openstack_version == "stable"

    - name: Stop local container registry
      community.docker.docker_container:
        name: registry
        state: stopped
      when: _publish | bool

    - name: Run export container
      community.docker.docker_container:
        name: export
        image: alpine
        state: started
        command: sh -c 'sleep infinity'
        volumes:
          - registry:/volume
          - "./:/export"
      when: _publish | bool

    - name: Export registry volume
      community.docker.docker_container_exec:
        container: export
        command: "sh -c 'cd /volume && tar cjf /export/{{ _tarball_name }} .'"
      when: _publish | bool

    - name: Get size of export archive
      ansible.builtin.stat:
        path: "{{ _tarball_name }}"
      register: result
      when: _publish | bool

    - name: Print size of export archive
      ansible.builtin.debug:
        msg: "{{ (result.stat.size / (1024 * 1024)) | round(2) }} MB"
      when:
        - _publish | bool
        - result.stat.exists

    - name: Install rclone
      become: true
      ansible.builtin.apt:
        name: rclone
        state: present
        update_cache: true
      when: _publish | bool

    - name: Run upload
      ansible.builtin.shell:  # noqa command-instead-of-module
        executable: /bin/bash
        cmd: |
          sha256sum {{ _tarball_name }} > {{ _tarball_name }}.CHECKSUM
          rclone copyto {{ _tarball_name }}.CHECKSUM s3:osism/metalbox/{{ _tarball_name }}.CHECKSUM
          rclone copyto {{ _tarball_name }} s3:osism/metalbox/{{ _tarball_name }}
      environment:
        RCLONE_CONFIG_S3_TYPE: s3
        RCLONE_CONFIG_S3_PROVIDER: Ceph
        RCLONE_CONFIG_S3_ENDPOINT: https://nbg1.your-objectstorage.com
        RCLONE_CONFIG_S3_REGION: nbg1
        RCLONE_CONFIG_S3_ACCESS_KEY_ID: "{{ secret.ACCESS_KEY | trim }}"
        RCLONE_CONFIG_S3_SECRET_ACCESS_KEY: "{{ secret.SECRET_KEY | trim }}"
        RCLONE_CONFIG_S3_ACL: public-read
        RCLONE_CONFIG_S3_NO_CHECK_BUCKET: "true"
      when: _publish | bool
      no_log: true
      changed_when: true
